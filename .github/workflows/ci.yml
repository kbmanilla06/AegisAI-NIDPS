name: ci

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.12"
          cache: pip
      - run: python -m pip install --upgrade pip
      - run: python -m pip install -e ".[dev]"
      - run: ruff check apps services tests scripts migrations
      - run: ruff format --check apps services tests scripts migrations
      - run: mypy
      - run: bandit -c pyproject.toml -r apps services
      - run: pytest
      - run: pip-audit
      - run: python scripts/check_secrets.py
      - run: python scripts/check_simulation_only.py

  frontend:
    runs-on: ubuntu-24.04
    defaults:
      run:
        working-directory: apps/dashboard
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: apps/dashboard/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck
      - run: npm run test
      - run: npm run build
      - run: npm audit --audit-level=high

  containers:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - run: POSTGRES_PASSWORD=ci-validation-only docker compose config --quiet
      - run: POSTGRES_PASSWORD=ci-validation-only docker compose build
      - run: docker image inspect aegisai-nidps-api aegisai-nidps-worker aegisai-nidps-dashboard
